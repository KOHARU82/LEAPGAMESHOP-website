<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leap Game Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="#" class="logo">Leap Game Store</a>
        <nav>
            <a href="#">Store</a>
            <a href="#">About</a>
            <a href="#">Library</a>
            <a href="#">Wishlist</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Game For Fun</h1>
        <p>Welcome to the Ulimate Playground</p>
    </section>

    <main class="container">
        <h2 class="section-title">Trending Games</h2>
        
        <div class="game-grid">
            
            <div class="game-card">
                <img src="GTA V.jpg" alt="Cyberpunk Odyssey" class="game-image">
                <div class="game-info">
                    <h3 class="game-title">Grannt Theft Auto V</h3>
                    <div class="game-price">$59.99</div>
                    <button class="btn-buy">Buy Now</button>
                </div>
            </div>

            <div class="game-card">
                <img src="spdm.jpg" alt="Retro Realms" class="game-image">
                <div class="game-info">
                    <h3 class="game-title">Spider-Man 2</h3>
                    <div class="game-price">$49.99</div>
                    <button class="btn-buy">Buy Now</button>
                </div>
            </div>

            <div class="game-card">
                <img src="ag.jpg" alt="Shadow Knight" class="game-image">
                <div class="game-info">
                    <h3 class="game-title">Among Us</h3>
                    <div class="game-price">$5.99</div>
                    <button class="btn-buy">Buy Now</button>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 LEAPGAME Store. All rights reserved.</p>
    </footer>

</body>
</html>
